<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Claude Cloak</title>
    <link rel="stylesheet" href="popup.css" />
  </head>
  <body>
    <main class="popup" role="main">
      <header class="header">
        <span class="header__badge">
          <img
            class="header__icon"
            src="../assets/icons/icon-128.png"
            alt=""
            width="26"
            height="26"
          />
        </span>
        <span class="header__text">
          <h1 class="header__title">Claude Cloak</h1>
          <span class="header__subtitle">Sidebar cleanup for Claude</span>
        </span>
      </header>

      <div class="control">
        <span class="control__copy">
          <label class="control__label" for="hide-toggle">Hide project chats</label>
          <span class="control__desc">Keep project chats out of the sidebar</span>
        </span>

        <!-- Native checkbox keeps full keyboard and screen-reader support; the
             visual track and thumb are drawn in CSS from this input's state. -->
        <span class="switch">
          <input
            class="switch__input"
            type="checkbox"
            id="hide-toggle"
            role="switch"
            aria-checked="true"
            checked
          />
          <span class="switch__track" aria-hidden="true">
            <span class="switch__thumb"></span>
          </span>
        </span>
      </div>

      <div class="status" id="status-row">
        <span class="status__dot" aria-hidden="true"></span>
        <p class="status__text" id="status" aria-live="polite">
          Checking the sidebar...
        </p>
      </div>

      <p class="hint">Reload Claude if a hidden chat reappears.</p>

      <footer class="footer">
        <span class="footer__by">Developed by</span>
        <a
          class="footer__link"
          href="https://abdullahbutt2210.vercel.app/"
          target="_blank"
          rel="noopener noreferrer"
          aria-label="MABCORP (opens in a new tab)"
        >
          <img class="footer__logo" src="../assets/logo/logo.png" alt="MABCORP" />
        </a>
      </footer>
    </main>

    <script src="popup.js"></script>
  </body>
</html>
